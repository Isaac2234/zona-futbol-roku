<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona de Futbol Roku - ¡Activa Tu Acceso!</title>
    <!-- Incluimos iconos de Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1565C0;
            --primary-green: #004d40;
            --accent-orange: #ff8f00;
            --text-dark: #333;
            --text-light: #fff;
            --background-light: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            color: var(--text-dark);
            background-color: var(--background-light);
            line-height: 1.6;
        }

        .hero-section {
    background: url('fondo.jpg') no-repeat center center/cover;
    color: var(--text-light);
    text-align: center;
    padding: 100px 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    height: 400px; /* Ajusta este valor */
    padding: 20px 0; /* Añade espacio interno */
}

        .hero-section h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: 800;
        }

        .hero-section h1 span {
            color: #ffc107;
        }

        .hero-section h2 {
            font-size: 2em;
            color: var(--accent-orange);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .hero-section p {
            font-size: 1.3em;
            max-width: 800px;
            margin: 0 auto;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .features-section {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .features-section h3 {
            border-bottom: 3px solid var(--primary-green);
            padding-bottom: 10px;
            color: var(--primary-green);
            margin-bottom: 30px;
            font-size: 1.5em;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .feature-icon {
            font-size: 1.8em;
            color: var(--primary-blue);
            margin-right: 15px;
            min-width: 40px;
            text-align: center;
        }

        /* Estilo especial para resaltar el texto de NFL, NBA, etc. */
        .feature-item.extra-sports {
            font-weight: bold;
            color: var(--accent-orange);
            border-top: 1px dashed #ccc;
            padding-top: 15px;
            margin-top: 10px;
        }

        .pricing-section {
            background-color: var(--text-light);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Solución al recorte: se usa background-size: contain */
        .tv-placeholder {
            width: 100%;
            max-width: 500px;
            height: 300px;
            background-image: url('tele.webp');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain; 
            border: 8px solid #222;
            border-radius: 12px;
            margin: 0 auto 30px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background-color: #111; 
        }

        .pricing-box h3 {
            color: var(--accent-orange);
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .pricing-box p {
            font-size: 1.2em;
            margin: 0;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .price-tag {
            font-size: 2.5em;
            color: var(--accent-orange);
            font-weight: 800;
        }

        .registration-section {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto 40px auto;
            text-align: center;
        }

        .registration-section h3 {
            color: var(--primary-blue);
            margin-bottom: 30px;
            font-size: 1.6em;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 1.2em;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input[type="email"]:focus, input[type="password"]:focus {
            border-color: var(--primary-blue);
            outline: none;
        }

        #btn-register {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-blue), #0b457e);
            color: var(--text-light);
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #btn-register:hover {
            background: linear-gradient(135deg, #0b457e, var(--primary-blue));
        }

        #btn-register:active {
            transform: translateY(1px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }

        #mensaje {
            margin-top: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .site-footer {
            background-color: var(--text-dark);
            color: var(--text-light);
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }

        .site-footer p {
            margin: 5px 0;
            font-size: 0.9em;
        }

        .site-footer .contact-info {
            font-weight: bold;
            color: var(--accent-orange);
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .hero-section {
                padding: 60px 20px;
            }
            .hero-section h1 {
                font-size: 2.2em;
            }
            .hero-section h2 {
                font-size: 1.5em;
            }
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="hero-section">
        <h1><span></span></h1>
        <h2></h2>
        <p></p>
        <p></p>
    </header>

    <main class="content-container main-content">
        <section class="features-section">
            <h3>Lo Que Incluye Tu Acceso</h3>
            <ul class="feature-list">
                <li class="feature-item"><i class="fas fa-trophy feature-icon" style="color: #d4af37;"></i> Mundial 2026</li>
                <li class="feature-item"><i class="fas fa-futbol feature-icon" style="color: #006600;"></i> Liga MX</li>
                <li class="feature-item"><i class="fas fa-certificate feature-icon" style="color: #1565C0;"></i> Champions League</li>
                <li class="feature-item"><i class="fas fa-star feature-icon" style="color: #000066;"></i> MLS</li>
                <li class="feature-item"><i class="fas fa-futbol feature-icon" style="color: #cc0000;"></i> La Liga España</li>
                <li class="feature-item"><i class="fas fa-trophy feature-icon" style="color: #1565C0;"></i> Premier League</li>
                <li class="feature-item"><i class="fas fa-globe-americas feature-icon" style="color: #d4af37;"></i> Copa Libertadores</li>
                <li class="feature-item extra-sports"><i class="fas fa-plus-circle feature-icon" style="color: var(--accent-orange);"></i> Y MUCHAS MÁS... NFL, NBA y MLB</li>
            </ul>
        </section>

        <section class="pricing-section">
            <div class="tv-placeholder"></div>
            <div class="pricing-box">
                <h3>¡APROVECHA NUESTRA OFERTA!</h3>
                <p>Un Solo Pago: <span class="price-tag">$499</span> MXN</p>
            </div>
        </section>
    </main>

    <section class="registration-section">
        <h3>REGÍSTRATE Y ACTIVA TU ACCESO AL INSTANTE</h3>
        <form id="registration-form" onsubmit="event.preventDefault();">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Correo electrónico" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Contraseña (mín. 6 car.)" minlength="6" required>
            </div>
            <button type="submit" id="btn-register">REGISTRARSE</button>
            <p id="mensaje"></p>
        </form>
    </section>

    <footer class="site-footer">
        <p class="contact-info">¡SOLICITA TU ACTIVACIÓN!</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
